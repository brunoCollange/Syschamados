<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syschamados UMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>

  <!-- AUTH PAGE -->
  <div id="authPage" class="auth-page" style="display:none">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <img src="logoWhite.png" alt="logo" width="78px">
        </div>
        <h1 class="auth-title">Sistema de Chamados</h1>
        <p class="auth-sub">developed by Bruno Collange</p>
      </div>
      <div id="loginError" class="alert alert-danger" style="display:none"></div>
      <form id="loginForm" action="/api/auth/login" method="post" autocomplete="on"
        onsubmit="event.preventDefault();doLogin()">
        <div class="form-group">
          <label class="form-label">Usuário</label>
          <input type="text" class="form-control" id="loginUsername" name="username" placeholder="seu usuário"
            autocomplete="username" oninput="this.value=this.value.toLowerCase()">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-control" id="loginPass" name="password" placeholder="••••••••"
            autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Entrar</button>
      </form>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="app" style="display:none">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <img src="logoWhite.png" alt="logo" width="40px">
        </div>
        <div>
          <div class="sidebar-logo-text">Chamados UMS</div>
          <div class="sidebar-logo-sub">v1.0 · by Bruno Collange</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a class="nav-item" data-page="dashboard" onclick="showPage('dashboard')">
          <svg viewBox="0 0 24 24">
            <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" fill="currentColor" />
          </svg>
          Dashboard
        </a>
        <a class="nav-item" data-page="tickets" onclick="showPage('tickets')">
          <svg viewBox="0 0 24 24">
            <path
              d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v4z"
              fill="currentColor" />
          </svg>
          Meus Chamados
        </a>
        <a class="nav-item" data-page="new-ticket" onclick="showPage('new-ticket')">
          <svg viewBox="0 0 24 24">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor" />
          </svg>
          Abrir Chamado
        </a>
        <div class="nav-section admin-only">Administracao</div>
        <a class="nav-item admin-only" data-page="all-tickets" onclick="showPage('all-tickets')">
          <svg viewBox="0 0 24 24">
            <path
              d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 10l-9 7z"
              fill="currentColor" />
          </svg>
          Todos os Chamados
        </a>
        <a class="nav-item admin-only" data-page="users" onclick="showPage('users')">
          <svg viewBox="0 0 24 24">
            <path
              d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
              fill="currentColor" />
          </svg>
          Usuários
        </a>
        <a class="nav-item" data-page="history" onclick="showPage('history')">
          <svg viewBox="0 0 24 24">
            <path
              d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.95-2.05L6.64 18.36C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"
              fill="currentColor" />
          </svg>
          Historico
        </a>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">??</div>
        <div class="user-info">
          <div class="user-name" id="sidebarName">-</div>
          <div class="user-role" id="sidebarRole">-</div>
        </div>
        <button class="logout-btn" onclick="doLogout()" title="Sair">
          <svg viewBox="0 0 24 24">
            <path
              d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
          </svg>
        </button>
      </div>
    </aside>

    <div class="main">
      <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
      <header class="topbar">
        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()">
          <svg viewBox="0 0 24 24">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
          </svg>
        </button>
        <div class="topbar-title" id="pageTitle">Dashboard</div>
        <div class="topbar-actions">
          <div style="position:relative">
            <button class="notif-btn" id="notifBtn" onclick="toggleNotif()">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" />
              </svg>
              <span class="notif-dot" id="notifDot" style="display:none"></span>
            </button>
            <div class="notif-panel" id="notifPanel">
              <div class="notif-header">
                <span>Notificações</span>
                <button class="btn btn-outline btn-xs" onclick="markAllRead()">Marcar lidas</button>
              </div>
              <div id="notifList">
                <div class="notif-empty">Carregando...</div>
              </div>
            </div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="showPage('new-ticket')">+ Novo Chamado</button>
        </div>
      </header>
      <main class="content" id="pageContent">
        <div class="loading">Carregando...</div>
      </main>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal" id="modalBox">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" onclick="closeModal()">x</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toastContainer"
    style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none">
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/tickets.js"></script>
  <script src="/js/pages/ticket-detail.js"></script>
  <script src="/js/pages/new-ticket.js"></script>
  <script src="/js/pages/users.js"></script>
  <script src="/js/pages/history.js"></script>
</body>

</html>
